  <script src="/_sdk/b7bbbe551ba4f8f5.editing_sdk.js" integrity="sha512-h06pMz6KcVo4Wjvoggb4sS5DZpb55bTriAzBmA0YwbkBA3z2ZXl8CBEbCWT+/fAsm0SwDejJ7jJHOZsLZKqPoQ=="></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();

      const rhythmMap = {
        quarter: { label: "四分音符", type: "quarter" },
        eighth: { label: "兩個八分音符", type: "eighth" },
        rest: { label: "四分休止符", type: "rest" }
      };

      // 音階對應表 (0 - 12)
      // Do：下加一線 (112px), Re：下加一間 (105px), Mi：第一線 (98px), Fa：第一間/或第一線 (91px -> 修改名稱 Fa 為 23 唱名), 
      // 完美支援使用唱名和音符：
      // Do：下加一線 (112px), Re：下加一間 (105px), Mi：第一線 (98px), Fa：第二間 (原 Fa：第一間，調整Fa唱名), Sol：第二線 (84px), La：第二間 (77px), Si：第三線 (70px)
      // 高音Do：第三間 (63px), 高音Re：第四線 (56px), 高音Mi：第四間 (49px), 高音Fa：第五線 (42px), 高音Sol：上加一間 (35px), 高音La：上加一線 (28px)
      const pitches = [
        { name: "Do", label: "Do · C", top: 96.5, ledger: true, upperLedger: false },
        { name: "Re", label: "Re · D", top: 89.5, ledger: false, upperLedger: false },
        { name: "Mi", label: "Mi · E", top: 82.5, ledger: false, upperLedger: false },
        { name: "Fa", label: "Fa · F", top: 75.5, ledger: false, upperLedger: false },
        { name: "Sol", label: "Sol · G", top: 68.5, ledger: false, upperLedger: false },
        { name: "La", label: "La · A", top: 61.5, ledger: false, upperLedger: false },
        { name: "Si", label: "Si · B", top: 54.5, ledger: false, upperLedger: false },
        { name: "Do2", label: "Do · C", top: 47.5, ledger: false, upperLedger: false },
        { name: "Re2", label: "Re · D", top: 40.5, ledger: false, upperLedger: false },
        { name: "Mi2", label: "Mi · E", top: 33.5, ledger: false, upperLedger: false },
        { name: "Fa2", label: "Fa · F", top: 26.5, ledger: false, upperLedger: false },
        { name: "Sol2", label: "Sol · G", top: 19.5, ledger: false, upperLedger: false },
        { name: "La2", label: "La · A", top: 12.5, ledger: false, upperLedger: true }
      ];

      const cards = Array.from(document.querySelectorAll("[data-rhythm]"));
      const zones = Array.from(document.querySelectorAll(".drop-zone"));
      const clearButton = document.getElementById("clear-button");
      let selectedRhythm = null;
      let selectedIngredient = null; // 當前點擊選中的配料

      // 配料拖曳與點擊初始化
      const ingredientBadges = document.querySelectorAll(".ingredient-badge");
      const wordSlots = document.querySelectorAll(".word-drop-slot");

      ingredientBadges.forEach(badge => {
        // 拖曳開始
        badge.addEventListener("dragstart", (e) => {
          e.dataTransfer.setData("text/plain", "ingredient:" + badge.dataset.word);
          e.dataTransfer.effectAllowed = "move";
          badge.classList.add("opacity-50");
        });

        badge.addEventListener("dragend", () => {
          badge.classList.remove("opacity-50");
        });

        // 點選配料卡片
        badge.addEventListener("click", () => {
          ingredientBadges.forEach(b => b.classList.remove("ring-4", "ring-orange-500"));
          if (selectedIngredient === badge.dataset.word) {
            selectedIngredient = null;
          } else {
            selectedIngredient = badge.dataset.word;
            badge.classList.add("ring-4", "ring-orange-500");
          }
        });
      });

      // 歌詞插槽目的地事件
      wordSlots.forEach(slot => {
        const input = slot.querySelector("input");

        // 點選插槽直接填入已點選的配料（如果是點到input之外的區域，或者空點擊）
        slot.addEventListener("click", (e) => {
          if (e.target === input) return; // 讓 input 正常取得 focus 進行打字
          if (selectedIngredient) {
            input.value = selectedIngredient;
            slot.className = "word-drop-slot bg-[#fdf5d6] border-2 border-solid border-[#e1aa33] font-bold text-xs text-[#4a341a]";
            selectedIngredient = null;
            ingredientBadges.forEach(b => b.classList.remove("ring-4", "ring-orange-500"));
          } else if (!input.value) {
            input.focus();
          }
        });

        // 監聽 input 的輸入與變化，維持樣式同步
        input.addEventListener("input", () => {
          if (input.value.trim() !== "") {
            slot.className = "word-drop-slot bg-[#fdf5d6] border-2 border-solid border-[#e1aa33] font-bold text-xs text-[#4a341a]";
          } else {
            slot.className = "word-drop-slot";
          }
        });

        slot.addEventListener("dragover", (e) => {
          e.preventDefault();
          slot.classList.add("drag-over");
        });

        slot.addEventListener("dragleave", () => {
          slot.classList.remove("drag-over");
        });

        slot.addEventListener("drop", (e) => {
          e.preventDefault();
          slot.classList.remove("drag-over");
          const data = e.dataTransfer.getData("text/plain");
          if (data && data.startsWith("ingredient:")) {
            const word = data.split(":")[1];
            input.value = word;
            slot.className = "word-drop-slot bg-[#fdf5d6] border-2 border-solid border-[#e1aa33] font-bold text-xs text-[#4a341a]";
          }
        });
      });

      function selectRhythm(rhythm) {
        selectedRhythm = rhythm;
        cards.forEach((card) => {
          const isSelected = card.dataset.rhythm === rhythm;
          card.classList.toggle("is-selected", isSelected);
          card.setAttribute("aria-pressed", String(isSelected));
        });
      }

      function applyPitch(note, pitchIndex, headIndex = 1) {
        const p = pitches[pitchIndex];
        const isEighth = note.classList.contains("eighth-pair");

        if (isEighth) {
          if (headIndex === 1) {
            note.dataset.pitchIndexOne = pitchIndex;
            note.dataset.pitchOne = p.name;
            note.style.setProperty("--head-top", p.top + "px");
            const headEl = note.querySelector(".note-head-one");
            const stemEl = note.querySelector(".note-stem-one");
            if (headEl) headEl.classList.toggle("stem-down-head", pitchIndex >= 6);
            if (stemEl) stemEl.classList.toggle("stem-down", pitchIndex >= 6);
            
            // 獨立控制第一個音符頭的加線 (Do 加線在 103px，高音La在 19px)
            const ledger1 = note.querySelector(".ledger-one");
            if (ledger1) {
              if (p.ledger) {
                ledger1.style.top = "103px";
                ledger1.style.left = "10px";
                ledger1.style.width = "36px";
                ledger1.style.display = "block";
              } else if (p.upperLedger) {
                ledger1.style.top = "19px";
                ledger1.style.left = "10px";
                ledger1.style.width = "36px";
                ledger1.style.display = "block";
              } else {
                ledger1.style.display = "none";
              }
            }
          } else {
            note.dataset.pitchIndexTwo = pitchIndex;
            note.dataset.pitchTwo = p.name;
            note.style.setProperty("--head-top-two", p.top + "px");
            const headEl = note.querySelector(".note-head-two");
            const stemEl = note.querySelector(".note-stem-two");
            if (headEl) headEl.classList.toggle("stem-down-head", pitchIndex >= 6);
            if (stemEl) stemEl.classList.toggle("stem-down", pitchIndex >= 6);

            // 獨立控制第二個音符頭的加線
            const ledger2 = note.querySelector(".ledger-two");
            if (ledger2) {
              if (p.ledger) {
                ledger2.style.top = "103px";
                ledger2.style.left = "46px";
                ledger2.style.width = "36px";
                ledger2.style.display = "block";
              } else if (p.upperLedger) {
                ledger2.style.top = "19px";
                ledger2.style.left = "46px";
                ledger2.style.width = "36px";
                ledger2.style.display = "block";
              } else {
                ledger2.style.display = "none";
              }
            }
          }

          // 連接橫桿 (Beam) 繪製
          const idx1 = note.dataset.pitchIndexOne !== undefined ? parseInt(note.dataset.pitchIndexOne, 10) : 2;
          const idx2 = note.dataset.pitchIndexTwo !== undefined ? parseInt(note.dataset.pitchIndexTwo, 10) : 2;
          const top1 = pitches[idx1].top;
          const top2 = pitches[idx2].top;

          // 樂理判斷：只有當兩個音頭都超過或等於第三線（>=6）時，符桿與 Beam 才會全朝下，否則都維持朝上。
          const stemDown = (idx1 >= 6 && idx2 >= 6);

          const stem1 = note.querySelector(".note-stem-one");
          const stem2 = note.querySelector(".note-stem-two");
          const head1 = note.querySelector(".note-head-one");
          const head2 = note.querySelector(".note-head-two");

          if (stem1 && stem2 && head1 && head2) {
            stem1.classList.toggle("stem-down", stemDown);
            stem2.classList.toggle("stem-down", stemDown);
            head1.classList.toggle("stem-down-head", stemDown);
            head2.classList.toggle("stem-down-head", stemDown);

            const beamPath = note.querySelector(".beam-path");
            if (beamPath) {
              // 修正八分音符放入與移動時符桿與 Beam 完美連接
              // 朝上時，符桿在右側 (x=35, x=71)，高度在符桿頂端 (top - 37)
              // 朝下時，符桿在左側 (x=18.5, x=54.5)，高度在符桿底端 (top + 8 + 42 = top + 50)
              const x1 = stemDown ? 18.5 : 35;
              const x2 = stemDown ? 54.5 : 71;
              const y1 = stemDown ? top1 + 50 : top1 - 37;
              const y2 = stemDown ? top2 + 50 : top2 - 37;
              
              const offset = stemDown ? -6 : 6;
              beamPath.setAttribute("d", `M ${x1} ${y1} L ${x2} ${y2} L ${x2} ${y2 + offset} L ${x1} ${y1 + offset} Z`);
            }
          }
        } else {
          // 單音符
          note.dataset.pitchIndex = pitchIndex;
          note.dataset.pitch = p.name;
          note.style.setProperty("--head-top", p.top + "px");

          // 超過從下往上算第三線 (Si, index >= 6) 符桿與符頭方向精確朝左側向下
          const stemDown = pitchIndex >= 6;
          const headEl = note.querySelector(".note-head");
          const stemEl = note.querySelector(".note-stem");
          if (headEl) headEl.classList.toggle("stem-down-head", stemDown);
          if (stemEl) stemEl.classList.toggle("stem-down", stemDown);

          // 控制下加線與上加線 (精確水平垂直居中)
          note.classList.toggle("show-ledger-line", p.ledger);
          note.classList.toggle("show-upper-ledger", p.upperLedger);
        }

        const label = note.querySelector(".pitch-label");
        if (label) label.textContent = p.label;
      }

      function createNote(rhythm) {
        if (rhythm === "rest") {
          const rest = document.createElement("span");
          rest.className = "rest-mark";
          rest.setAttribute("aria-hidden", "true");
          rest.textContent = "𝄽";
          return rest;
        }

        const note = document.createElement("div");
        note.className = "staff-note";
        note.tabIndex = 0;
        note.setAttribute("role", "slider");
        note.setAttribute("aria-valuemin", "0");
        note.setAttribute("aria-valuemax", "12");

        if (rhythm === "eighth") {
          note.classList.add("eighth-pair");
          note.innerHTML = `
            <span class="note-head note-head-one" data-head-id="1"></span>
            <span class="note-head note-head-two" data-head-id="2"></span>
            <span class="note-stem note-stem-one"></span>
            <span class="note-stem note-stem-two"></span>
            <span class="ledger-one"></span>
            <span class="ledger-two"></span>
            <svg class="beam-svg"><path class="beam-path" fill="currentColor" d=""></path></svg>
            <span class="pitch-label"></span>
          `;
          note.dataset.pitchIndexOne = "2";
          note.dataset.pitchIndexTwo = "2";
          applyPitch(note, 2, 1);
          applyPitch(note, 2, 2);
        } else {
          note.innerHTML = '<span class="note-head" data-head-id="1"></span><span class="note-stem"></span><span class="pitch-label"></span>';
          applyPitch(note, 2, 1);
        }

        note.setAttribute("aria-valuenow", "2");
        note.setAttribute("aria-valuetext", "Mi，E，符桿朝上");
        addPitchControls(note);
        return note;
      }

      function updateAccessiblePitch(note) {
        if (note.classList.contains("eighth-pair")) {
          const idx1 = parseInt(note.dataset.pitchIndexOne, 10) || 2;
          const idx2 = parseInt(note.dataset.pitchIndexTwo, 10) || 2;
          note.setAttribute("aria-valuenow", `${idx1},${idx2}`);
          note.setAttribute("aria-valuetext", `音符一: ${pitches[idx1].label}, 音符二: ${pitches[idx2].label}`);
        } else {
          const index = parseInt(note.dataset.pitchIndex, 10) || 2;
          const p = pitches[index];
          note.setAttribute("aria-valuenow", String(index));
          note.setAttribute("aria-valuetext", p.label + (index >= 6 ? "，符桿朝下" : "，符桿朝上"));
        }
      }

      function addPitchControls(note) {
        let dragging = false;
        let startY = 0;
        let initialIndex = 2;
        let targetHead = 1; // 1代表音符一，2代表音符二

        // 監聽各音符頭的拖曳
        note.addEventListener("pointerdown", (event) => {
          const head = event.target.closest("[data-head-id]");
          if (!head) return;

          dragging = true;
          startY = event.clientY;
          targetHead = parseInt(head.dataset.headId, 10) || 1;
          
          if (note.classList.contains("eighth-pair")) {
            initialIndex = parseInt(targetHead === 1 ? note.dataset.pitchIndexOne : note.dataset.pitchIndexTwo, 10) || 2;
          } else {
            initialIndex = parseInt(note.dataset.pitchIndex, 10) || 2;
          }

          note.classList.add("dragging");
          head.setPointerCapture(event.pointerId);
          event.stopPropagation();
          event.preventDefault();
        });

        note.addEventListener("pointermove", (event) => {
          if (!dragging) return;
          const deltaY = event.clientY - startY;
          // 將原本 / 7 改為 / 6.5 或調整除數，增加拖曳靈敏度與音符定位精準度
          const stepOffset = -Math.round(deltaY / 6.8);
          let targetIndex = initialIndex + stepOffset;
          if (targetIndex < 0) targetIndex = 0;
          if (targetIndex > 12) targetIndex = 12;
          
          applyPitch(note, targetIndex, targetHead);
          updateAccessiblePitch(note);
        });

        function finishDrag(event) {
          if (!dragging) return;
          dragging = false;
          note.classList.remove("dragging");
        }

        note.addEventListener("pointerup", finishDrag);
        note.addEventListener("pointercancel", finishDrag);

        note.addEventListener("keydown", (event) => {
          if (event.key === "ArrowUp" || event.key === "ArrowDown") {
            event.preventDefault();
            const isEighth = note.classList.contains("eighth-pair");
            if (isEighth) {
              // 鍵盤操作時，同時微調兩個音高的範例
              let idx1 = parseInt(note.dataset.pitchIndexOne, 10) || 2;
              let idx2 = parseInt(note.dataset.pitchIndexTwo, 10) || 2;
              const offset = event.key === "ArrowUp" ? 1 : -1;
              idx1 = Math.max(0, Math.min(12, idx1 + offset));
              idx2 = Math.max(0, Math.min(12, idx2 + offset));
              applyPitch(note, idx1, 1);
              applyPitch(note, idx2, 2);
            } else {
              let index = parseInt(note.dataset.pitchIndex, 10) || 2;
              index = event.key === "ArrowUp" ? index + 1 : index - 1;
              if (index < 0) index = 0;
              if (index > 12) index = 12;
              applyPitch(note, index, 1);
            }
            updateAccessiblePitch(note);
          }
        });
      }

      function placeRhythm(zone, rhythm) {
        const rhythmData = rhythmMap[rhythm];
        if (!rhythmData) return;

      zone.replaceChildren();
      zone.appendChild(createNote(rhythm));

        zone.classList.add("has-rhythm");
        zone.setAttribute("aria-label", zone.dataset.row + "，" + zone.dataset.beatLabel + "，已放入" + rhythmData.label + "。");
      }

      cards.forEach((card) => {
        card.addEventListener("click", () => selectRhythm(card.dataset.rhythm));

        card.addEventListener("dragstart", (event) => {
          selectRhythm(card.dataset.rhythm);
          event.dataTransfer.effectAllowed = "copy";
          event.dataTransfer.setData("text/plain", card.dataset.rhythm);
        });
      });

      zones.forEach((zone) => {
        zone.addEventListener("click", (event) => {
          if (event.target.closest(".staff-note")) return;
          if (!selectedRhythm) {
            return;
          }
          placeRhythm(zone, selectedRhythm);
        });

        zone.addEventListener("dragover", (event) => {
          event.preventDefault();
          event.dataTransfer.dropEffect = "copy";
          zone.classList.add("drag-over");
        });

        zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));

        zone.addEventListener("drop", (event) => {
          const dragData = event.dataTransfer.getData("text/plain");
          if (dragData && dragData.startsWith("ingredient:")) return; // 避免把配料拖到五線譜
          event.preventDefault();
          zone.classList.remove("drag-over");
          if (rhythmMap[dragData]) {
            selectRhythm(dragData);
            placeRhythm(zone, dragData);
          }
        });
      });

      clearButton.addEventListener("click", () => {
        // 清除節奏
        zones.forEach((zone) => {
          zone.replaceChildren();
          zone.classList.remove("has-rhythm", "drag-over");
          zone.setAttribute("aria-label", zone.dataset.row + "，" + zone.dataset.beatLabel + "，選擇或拖曳節奏卡到這裡");
        });

        // 重置配料歌詞填寫插槽
        wordSlots.forEach(slot => {
          const input = slot.querySelector("input");
          if (input) input.value = "";
          slot.className = "word-drop-slot";
        });

        selectedRhythm = null;
        selectedIngredient = null;
        ingredientBadges.forEach(b => b.classList.remove("ring-4", "ring-orange-500"));
        cards.forEach((card) => {
          card.classList.remove("is-selected");
          card.setAttribute("aria-pressed", "false");
        });
      });
    });
  </script>
 </body>
</html>
